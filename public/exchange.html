<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exchange</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="nav">
    <a href="/dashboard.html"><button>Dashboard</button></a>
    <a href="/game.html"><button>Game</button></a>
    <a href="/exchange.html"><button>Exchange</button></a>
  </div>

  <h1>Exchange</h1>

  <div class="section">
    <h2>유저 칩 추가/감소</h2>

    <div class="form-row">
      <label>플레이어</label><br />
      <select id="adjustPlayer" onchange="updateAdjustHint()"></select>
    </div>

    <div class="form-row">
      <label>조정 방식</label><br />
      <select id="adjustAction" onchange="updateAdjustHint()">
        <option value="add">추가</option>
        <option value="subtract">감소</option>
      </select>
    </div>

    <div class="form-row">
      <label>칩 색</label><br />
      <select id="adjustColor" onchange="renderPlayerOptions(); updateAdjustHint()">
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="yellow">Yellow</option>
        <option value="white">White</option>
      </select>
    </div>

    <div class="form-row">
      <label>수량</label><br />
      <input id="adjustAmount" type="number" min="1" step="1" placeholder="1" oninput="updateAdjustHint()" />
    </div>

    <button onclick="adjustChip()">적용</button>
    <div class="hint" id="adjustHint"></div>
  </div>

  <div class="section">
    <h2>플레이어 간 칩 이동</h2>

    <div class="form-row">
      <label>보내는 플레이어</label><br />
      <select id="fromPlayer" onchange="updateMoveHint()"></select>
    </div>

    <div class="form-row">
      <label>받는 플레이어</label><br />
      <select id="toPlayer" onchange="updateMoveHint()"></select>
    </div>

    <div class="form-row">
      <label>칩 색</label><br />
      <select id="moveColor" onchange="renderPlayerOptions(); updateMoveHint()">
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="yellow">Yellow</option>
        <option value="white">White</option>
      </select>
    </div>

    <div class="form-row">
      <label>수량</label><br />
      <input id="moveAmount" type="number" min="1" step="1" placeholder="1" oninput="updateMoveHint()" />
    </div>

    <button onclick="sendChip()">전송</button>
    <div class="hint" id="moveHint"></div>
  </div>

  <div class="section">
    <h2>플레이어 잔고 교환</h2>

    <div class="form-row">
      <label>A 캐릭터</label><br />
      <select id="swapPlayerA" onchange="updateSwapHint()"></select>
    </div>

    <div class="form-row">
      <label>B 캐릭터</label><br />
      <select id="swapPlayerB" onchange="updateSwapHint()"></select>
    </div>

    <button onclick="swapBalances()">잔고 교환</button>
    <div class="hint" id="swapHint"></div>
  </div>

  <div class="section">
    <h2>색 변환 환전</h2>

    <div class="form-row">
      <label>플레이어</label><br />
      <select id="convertPlayer" onchange="updateConvertHint()"></select>
    </div>

    <div class="form-row">
      <label>변환 전</label><br />
      <select id="fromColor" onchange="renderPlayerOptions(); updateConvertHint()">
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="yellow">Yellow</option>
        <option value="white">White</option>
      </select>
    </div>

    <div class="form-row">
      <label>변환 후</label><br />
      <select id="toColor" onchange="updateConvertHint()">
        <option value="red">Red</option>
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="yellow">Yellow</option>
        <option value="white">White</option>
      </select>
    </div>

    <div class="form-row">
      <label>수량</label><br />
      <input id="convertAmount" type="number" min="1" step="1" placeholder="1" oninput="updateConvertHint()" />
    </div>

    <button onclick="convertChip()">환전</button>
    <div class="hint" id="convertHint"></div>
  </div>

  <div class="section">
    <h2>관리자 환율 설정</h2>

    <div class="form-row">
      <label>Red 가치</label><br />
      <input id="rateRed" type="number" min="1" step="1" />
    </div>

    <div class="form-row">
      <label>Blue 가치</label><br />
      <input id="rateBlue" type="number" min="1" step="1" />
    </div>

    <div class="form-row">
      <label>Green 가치</label><br />
      <input id="rateGreen" type="number" min="1" step="1" />
    </div>

    <div class="form-row">
      <label>Yellow 가치</label><br />
      <input id="rateYellow" type="number" min="1" step="1" />
    </div>

    <div class="form-row">
      <label>White 가치</label><br />
      <input id="rateWhite" type="number" min="1" step="1" />
    </div>

    <button onclick="setRates()">비율 적용</button>
    <button onclick="randomizeRates()">환율 랜덤</button>
  </div>

  <script>
    let players = [];
    let rates = {};
    const CHIP_LABELS = {
      red: 'Red',
      blue: 'Blue',
      green: 'Green',
      yellow: 'Yellow',
      white: 'White'
    };

    async function readResponse(res) {
      const text = await res.text();

      try {
        return text ? JSON.parse(text) : {};
      } catch (err) {
        return { error: text || '응답을 읽을 수 없습니다.' };
      }
    }

    async function loadPlayers() {
      const res = await fetch('/api/players');
      const data = await readResponse(res);

      if (!res.ok) {
        alert(data.error || '플레이어를 불러오지 못했습니다.');
        return;
      }

      players = Array.isArray(data) ? data : [];
      renderPlayerOptions();
      updateHints();
    }

    async function loadRates() {
      const res = await fetch('/api/rates');
      const data = await readResponse(res);

      if (!res.ok) {
        alert(data.error || '칩 가치를 불러오지 못했습니다.');
        return;
      }

      rates = data;
      document.getElementById('rateRed').value = rates.red;
      document.getElementById('rateBlue').value = rates.blue;
      document.getElementById('rateGreen').value = rates.green;
      document.getElementById('rateYellow').value = rates.yellow;
      document.getElementById('rateWhite').value = rates.white;
      renderPlayerOptions();
      updateHints();
    }

    function getPlayerById(playerId) {
      return players.find((player) => player.id === Number(playerId));
    }

    function getChipAmount(value) {
      return Math.floor(Number(value));
    }

    function getChipBalance(player, color) {
      return Math.floor(Number(player?.[color] || 0));
    }

    function getTotalValue(player) {
      const hasRates = Object.keys(CHIP_LABELS)
        .every((color) => Number.isFinite(Number(rates[color])));

      if (hasRates) {
        return Object.keys(CHIP_LABELS)
          .reduce((total, color) => total + getChipBalance(player, color) * Number(rates[color]), 0);
      }

      return Number.isFinite(Number(player?.totalValue)) ? Math.floor(Number(player.totalValue)) : 0;
    }

    function formatChipSummary(player) {
      return Object.keys(CHIP_LABELS)
        .map((color) => `${CHIP_LABELS[color]}:${getChipBalance(player, color)}`)
        .join(' ');
    }

    function formatBalanceText(player) {
      return `플레이어: ${player.name}
잔고: ${formatChipSummary(player)}
총 가치: ${getTotalValue(player)}`;
    }

    function formatPlayerOption(player, color) {
      return `${player.name} (#${player.id}) - ${CHIP_LABELS[color]}:${getChipBalance(player, color)}`;
    }

    function setSelectOptions(selectId, color) {
      const select = document.getElementById(selectId);
      const selectedValue = select.value;

      select.innerHTML = players
        .map((player) => `<option value="${player.id}">${formatPlayerOption(player, color)}</option>`)
        .join('');

      if (players.some((player) => String(player.id) === selectedValue)) {
        select.value = selectedValue;
      }
    }

    function setBalanceSelectOptions(selectId) {
      const select = document.getElementById(selectId);
      const selectedValue = select.value;

      select.innerHTML = players
        .map((player) => `<option value="${player.id}">${player.name} (#${player.id}) - 총 가치:${getTotalValue(player)}</option>`)
        .join('');

      if (players.some((player) => String(player.id) === selectedValue)) {
        select.value = selectedValue;
      }
    }

    function renderPlayerOptions() {
      setSelectOptions('adjustPlayer', document.getElementById('adjustColor').value);
      setSelectOptions('fromPlayer', document.getElementById('moveColor').value);
      setSelectOptions('toPlayer', document.getElementById('moveColor').value);
      setBalanceSelectOptions('swapPlayerA');
      setBalanceSelectOptions('swapPlayerB');
      setSelectOptions('convertPlayer', document.getElementById('fromColor').value);
    }

    function mergePlayers(nextPlayers) {
      if (!Array.isArray(nextPlayers)) {
        return;
      }

      nextPlayers.forEach((nextPlayer) => {
        const existingPlayer = getPlayerById(nextPlayer.id);

        if (existingPlayer) {
          Object.assign(existingPlayer, nextPlayer);
        } else {
          players.push(nextPlayer);
        }
      });

      renderPlayerOptions();
      updateHints();
    }

    function updateHints() {
      updateAdjustHint();
      updateMoveHint();
      updateSwapHint();
      updateConvertHint();
    }

    function updateAdjustHint() {
      const player = getPlayerById(document.getElementById('adjustPlayer').value);
      const action = document.getElementById('adjustAction').value;
      const color = document.getElementById('adjustColor').value;
      const amount = getChipAmount(document.getElementById('adjustAmount').value);
      const balance = getChipBalance(player, color);
      const nextBalance = Number.isFinite(amount) && amount > 0
        ? action === 'add' ? balance + amount : balance - amount
        : balance;
      const status = action === 'subtract' && nextBalance < 0 ? ' / 잔고 부족' : '';

      document.getElementById('adjustHint').textContent = player
        ? `현재 ${CHIP_LABELS[color]} ${balance}개 / 적용 후 ${nextBalance}개${status}`
        : '';
    }

    function updateMoveHint() {
      const from = getPlayerById(document.getElementById('fromPlayer').value);
      const color = document.getElementById('moveColor').value;
      const amount = getChipAmount(document.getElementById('moveAmount').value);
      const balance = getChipBalance(from, color);
      const status = Number.isFinite(amount) && amount > 0 && balance < amount ? '부족' : '가능';

      document.getElementById('moveHint').textContent = from
        ? `보내는 플레이어 보유: ${CHIP_LABELS[color]} ${balance}개 (${status})`
        : '';
    }

    function updateSwapHint() {
      const first = getPlayerById(document.getElementById('swapPlayerA').value);
      const second = getPlayerById(document.getElementById('swapPlayerB').value);
      const hint = document.getElementById('swapHint');

      if (!first || !second) {
        hint.textContent = '';
        return;
      }

      if (first.id === second.id) {
        hint.textContent = '서로 다른 플레이어를 선택하세요.';
        return;
      }

      hint.textContent = `${first.name}: ${formatChipSummary(first)} ↔ ${second.name}: ${formatChipSummary(second)}`;
    }

    function updateConvertHint() {
      const player = getPlayerById(document.getElementById('convertPlayer').value);
      const fromColor = document.getElementById('fromColor').value;
      const toColor = document.getElementById('toColor').value;
      const amount = getChipAmount(document.getElementById('convertAmount').value);
      const balance = getChipBalance(player, fromColor);
      const result = Number.isFinite(amount) && amount > 0 && rates[fromColor] && rates[toColor]
        ? Math.floor((amount * rates[fromColor]) / rates[toColor])
        : '-';

      document.getElementById('convertHint').textContent = player
        ? `보유 ${CHIP_LABELS[fromColor]} ${balance}개 / 예상 지급 ${CHIP_LABELS[toColor]} ${result}개`
        : '';
    }

    function fallbackCopyText(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'fixed';
      textarea.style.left = '-9999px';
      document.body.appendChild(textarea);
      textarea.select();

      try {
        return document.execCommand('copy');
      } finally {
        document.body.removeChild(textarea);
      }
    }

    async function copyText(text) {
      if (!text) {
        return false;
      }

      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        }

        return fallbackCopyText(text);
      } catch (err) {
        console.error(err);
        try {
          return fallbackCopyText(text);
        } catch (copyErr) {
          console.error(copyErr);
          return false;
        }
      }
    }

    async function copyBalanceText(data, fallbackPlayers = []) {
      const text = data.balanceText ||
        (Array.isArray(data.balanceTexts) ? data.balanceTexts.join('\n\n') : '') ||
        fallbackPlayers.map(formatBalanceText).join('\n\n');

      return copyText(text);
    }

    function getCopyMessage(copied) {
      return copied ? '\n현재 잔고를 복사했습니다.' : '\n현재 잔고 복사에 실패했습니다.';
    }

    async function adjustChip() {
      const action = document.getElementById('adjustAction').value;
      const player = getPlayerById(document.getElementById('adjustPlayer').value);
      const color = document.getElementById('adjustColor').value;
      const amount = getChipAmount(document.getElementById('adjustAmount').value);

      if (!Number.isFinite(amount) || amount <= 0) {
        alert('조정 수량을 1 이상으로 입력하세요.');
        return;
      }

      if (!player) {
        alert('플레이어를 선택하세요.');
        return;
      }

      if (action === 'subtract' && getChipBalance(player, color) < amount) {
        alert('보유 칩이 부족합니다.');
        return;
      }

      const res = await fetch('/api/chips/adjust', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          playerId: player.id,
          action,
          color,
          amount
        })
      });

      const data = await readResponse(res);

      if (!res.ok) {
        alert(data.error || '칩 조정 실패');
        return;
      }

      mergePlayers(data.players);
      const copied = await copyBalanceText(data, data.players);
      alert(`${action === 'add' ? '칩 추가 완료' : '칩 감소 완료'}${getCopyMessage(copied)}`);
    }

    async function sendChip() {
      const amount = getChipAmount(document.getElementById('moveAmount').value);

      if (!Number.isFinite(amount) || amount <= 0) {
        alert('이동 수량을 1 이상으로 입력하세요.');
        return;
      }

      const res = await fetch('/api/exchange', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fromId: Number(document.getElementById('fromPlayer').value),
          toId: Number(document.getElementById('toPlayer').value),
          color: document.getElementById('moveColor').value,
          amount
        })
      });

      const data = await readResponse(res);

      if (!res.ok) {
        alert(data.error || '칩 이동 실패');
        return;
      }

      mergePlayers(data.players);
      const copied = await copyBalanceText(data, data.players);
      alert(`칩 이동 완료${getCopyMessage(copied)}`);
    }

    async function swapBalances() {
      const firstId = Number(document.getElementById('swapPlayerA').value);
      const secondId = Number(document.getElementById('swapPlayerB').value);

      if (!Number.isFinite(firstId) || !Number.isFinite(secondId)) {
        alert('교환할 플레이어를 선택하세요.');
        return;
      }

      if (firstId === secondId) {
        alert('서로 다른 플레이어를 선택하세요.');
        return;
      }

      const res = await fetch('/api/balance/swap', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          firstId,
          secondId
        })
      });

      const data = await readResponse(res);

      if (!res.ok) {
        alert(data.error || '잔고 교환 실패');
        return;
      }

      mergePlayers(data.players);
      const copied = await copyBalanceText(data, data.players);
      alert(`잔고 교환 완료${getCopyMessage(copied)}`);
    }

    async function convertChip() {
      const amount = getChipAmount(document.getElementById('convertAmount').value);

      if (!Number.isFinite(amount) || amount <= 0) {
        alert('환전 수량을 1 이상으로 입력하세요.');
        return;
      }

      const res = await fetch('/api/convert', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          playerId: Number(document.getElementById('convertPlayer').value),
          fromColor: document.getElementById('fromColor').value,
          toColor: document.getElementById('toColor').value,
          amount
        })
      });

      const data = await readResponse(res);

      if (!res.ok) {
        alert(data.error || '환전 실패');
        return;
      }

      mergePlayers(data.players);
      const copied = await copyBalanceText(data, data.players);
      alert(`환전 완료: ${data.result}개 지급${getCopyMessage(copied)}`);
    }

    async function setRates() {
      const res = await fetch('/api/rates', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          red: Number(document.getElementById('rateRed').value),
          blue: Number(document.getElementById('rateBlue').value),
          green: Number(document.getElementById('rateGreen').value),
          yellow: Number(document.getElementById('rateYellow').value),
          white: Number(document.getElementById('rateWhite').value)
        })
      });

      const data = await readResponse(res);

      if (!res.ok) {
        alert(data.error || '비율 적용 실패');
        return;
      }

      alert('비율 적용 완료');
      if (data.rates) {
        rates = data.rates;
        document.getElementById('rateRed').value = rates.red;
        document.getElementById('rateBlue').value = rates.blue;
        document.getElementById('rateGreen').value = rates.green;
        document.getElementById('rateYellow').value = rates.yellow;
        document.getElementById('rateWhite').value = rates.white;
        renderPlayerOptions();
        updateHints();
      }
    }

    function shuffleValues(values) {
      const shuffled = [...values];

      for (let index = shuffled.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [shuffled[index], shuffled[swapIndex]] = [shuffled[swapIndex], shuffled[index]];
      }

      return shuffled;
    }

    async function randomizeRates() {
      const [red, blue, green, yellow, white] = shuffleValues([1, 5, 10, 20, 50]);

      document.getElementById('rateRed').value = red;
      document.getElementById('rateBlue').value = blue;
      document.getElementById('rateGreen').value = green;
      document.getElementById('rateYellow').value = yellow;
      document.getElementById('rateWhite').value = white;

      await setRates();
    }

    loadPlayers();
    loadRates();
  </script>
</body>
</html>
