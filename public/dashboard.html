<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="nav">
    <a href="/dashboard.html"><button>Dashboard</button></a>
    <a href="/game.html"><button>Game</button></a>
    <a href="/exchange.html"><button>Exchange</button></a>
    <button onclick="reloadPlayers()">Refresh</button>
    <button onclick="copyLog()">Copy latest public log</button>
  </div>

  <h1>Dashboard</h1>

  <h2>칩 가치 확인</h2>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Team</th>
          <th>Red</th>
          <th>Blue</th>
          <th>Green</th>
          <th>Yellow</th>
          <th>White</th>
          <th>Total Value</th>
        </tr>
      </thead>
      <tbody id="chipTb"></tbody>
    </table>
  </div>

  <h2>리미트 확인</h2>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Team</th>
          <th>Roulette</th>
          <th>High Low</th>
          <th>Baccarat</th>
          <th>Blackjack</th>
          <th>Red Black</th>
        </tr>
      </thead>
      <tbody id="limitTb"></tbody>
    </table>
  </div>

  <h2>Team Totals</h2>
  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Team</th>
          <th>Players</th>
          <th>Red</th>
          <th>Blue</th>
          <th>Green</th>
          <th>Yellow</th>
          <th>White</th>
          <th>Total Value</th>
        </tr>
      </thead>
      <tbody id="teamTb"></tbody>
    </table>
  </div>

  <h2>Latest Public Log</h2>
  <textarea id="log" readonly></textarea>

  <h2>All Logs</h2>
  <div class="toolbar">
    <label for="logTypeFilter">Filter</label>
    <select id="logTypeFilter" onchange="renderLogs()">
      <option value="all">All logs</option>
      <option value="blackjack">Blackjack</option>
      <option value="pvpblackjack">PVP Blackjack</option>
      <option value="roulette">Roulette</option>
      <option value="highlow">High Low</option>
      <option value="baccarat">Baccarat</option>
      <option value="pvpbaccarat">PVP Baccarat</option>
      <option value="redblack">Red Black</option>
      <option value="russianroulette">Russian Roulette</option>
      <option value="formulahighlow">Formula High Low 2P</option>
      <option value="balance">Balance</option>
      <option value="exchange">Chip Move</option>
      <option value="convert">Convert</option>
    </select>
    <span id="logCount"></span>
  </div>
  <div id="logList" class="log-list"></div>

  <script>
    const chipTb = document.getElementById('chipTb');
    const limitTb = document.getElementById('limitTb');
    const teamTb = document.getElementById('teamTb');
    const logBox = document.getElementById('log');
    const logList = document.getElementById('logList');
    const logTypeFilter = document.getElementById('logTypeFilter');
    const logCount = document.getElementById('logCount');
    let latestPublicLogText = '';
    let allLogs = [];
    const GAME_LIMIT_LABELS = {
      roulette: 'Roulette',
      highlow: 'High Low',
      baccarat: 'Baccarat',
      blackjack: 'Blackjack',
      redblack: 'Red Black'
    };

    function formatLimit(value) {
      return Number.isFinite(Number(value)) ? Number(value) : 'no limit';
    }

    function renderChipValues(players) {
      chipTb.innerHTML = '';
      players.forEach((p) => {
        chipTb.innerHTML += `
          <tr>
            <td><button class="id-button" type="button" onclick="logBalance(${p.id})">${p.id}</button></td>
            <td>${p.name}</td>
            <td>${p.team || '-'}</td>
            <td style="color:red">${p.red || 0}</td>
            <td style="color:blue">${p.blue || 0}</td>
            <td style="color:green">${p.green || 0}</td>
            <td style="color:#c7a000">${p.yellow || 0}</td>
            <td>${p.white || 0}</td>
            <td>${p.totalValue || 0}</td>
          </tr>
        `;
      });
    }

    function renderLimits(players) {
      limitTb.innerHTML = '';
      players.forEach((p) => {
        const limits = p.gameLimits || {};
        limitTb.innerHTML += `
          <tr>
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>${p.team || '-'}</td>
            <td>${formatLimit(limits.roulette)}</td>
            <td>${formatLimit(limits.highlow)}</td>
            <td>${formatLimit(limits.baccarat)}</td>
            <td>${formatLimit(limits.blackjack)}</td>
            <td>${formatLimit(limits.redblack)}</td>
          </tr>
        `;
      });
    }

    function renderTeams(teams) {
      teamTb.innerHTML = '';

      if (!teams.length) {
        teamTb.innerHTML = '<tr><td colspan="8">No teams yet.</td></tr>';
        return;
      }

      teams.forEach((team) => {
        const chips = team.chipTotals || {};
        teamTb.innerHTML += `
          <tr>
            <td>${team.team || '-'}</td>
            <td>${team.playerCount || 0}</td>
            <td style="color:red">${chips.red || 0}</td>
            <td style="color:blue">${chips.blue || 0}</td>
            <td style="color:green">${chips.green || 0}</td>
            <td style="color:#c7a000">${chips.yellow || 0}</td>
            <td>${chips.white || 0}</td>
            <td>${team.totalValue || 0}</td>
          </tr>
        `;
      });
    }

    async function reloadPlayers() {
      const teamRes = await fetch('/api/teams');
      const teamData = await teamRes.json();
      renderChipValues(teamData.players || []);
      renderLimits(teamData.players || []);
      renderTeams(teamData.teams || []);

      const logsRes = await fetch('/api/logs?limit=100');
      allLogs = await logsRes.json();
      renderLogs();
    }

    async function readResponse(res) {
      const text = await res.text();

      try {
        return text ? JSON.parse(text) : {};
      } catch (err) {
        return { error: text || res.statusText || 'Unexpected server response.' };
      }
    }

    async function logBalance(playerId) {
      const res = await fetch('/api/balance-log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ playerId })
      });
      const data = await readResponse(res);

      if (!res.ok) {
        alert(data.error || '잔고 로그 생성 실패');
        return;
      }

      renderLogs(data.logs);
    }

    async function copyLog() {
      await copyText(latestPublicLogText || logBox.value);
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        alert('Copied.');
      } catch (err) {
        console.error(err);
        alert('Copy failed.');
      }
    }

    function getFilteredLogs() {
      const selectedType = logTypeFilter.value;
      return selectedType === 'all'
        ? allLogs
        : allLogs.filter((log) => log.type === selectedType);
    }

    function mergeLogs(logs) {
      if (Array.isArray(logs)) {
        const seen = new Set();
        allLogs = [...logs, ...allLogs]
          .filter((log) => {
            const key = log.id || `${log.type}-${log.createdAt}-${log.text}`;

            if (seen.has(key)) {
              return false;
            }

            seen.add(key);
            return true;
          })
          .slice(0, 100);
      }

      return allLogs;
    }

    function parsePvpPublicSections(text) {
      const matches = [...String(text || '').matchAll(/^\[(공통 공개|플레이어 1 공개|플레이어 2 공개)\]\s*$/gm)];

      if (!matches.length) {
        return null;
      }

      return {
        title: text.slice(0, matches[0].index).trim(),
        sections: matches.map((match, index) => {
          const start = match.index + match[0].length;
          const end = matches[index + 1]?.index ?? text.length;

          return {
            label: match[1],
            text: text.slice(start, end).trim()
          };
        })
      };
    }

    function getSectionCopyText(parsed, section) {
      const common = parsed.sections.find((candidate) => candidate.label === '공통 공개');

      if (!section.label.startsWith('플레이어') || !common) {
        return [
          parsed.title,
          `[${section.label}]\n${section.text}`
        ].filter(Boolean).join('\n\n');
      }

      const parts = [];

      if (parsed.title) {
        parts.push(parsed.title);
      }

      parts.push(`[${common.label}]\n${common.text}`);
      parts.push(`[${section.label}]\n${section.text}`);
      return parts.join('\n\n');
    }

    function appendLogBody(container, text) {
      const parsed = parsePvpPublicSections(text);

      if (!parsed) {
        const pre = document.createElement('pre');
        pre.textContent = text;
        container.appendChild(pre);
        return;
      }

      const wrapper = document.createElement('div');
      wrapper.className = 'log-public-sections';

      if (parsed.title) {
        const title = document.createElement('div');
        title.className = 'log-public-title';
        title.textContent = parsed.title;
        wrapper.appendChild(title);
      }

      parsed.sections.forEach((section) => {
        const block = document.createElement('div');
        const header = document.createElement('div');
        const label = document.createElement('strong');
        const pre = document.createElement('pre');

        block.className = 'log-public-section';
        header.className = 'log-public-section-head';
        label.textContent = section.label;
        pre.textContent = section.text;
        header.appendChild(label);

        if (section.label === '공통 공개' || section.label.startsWith('플레이어')) {
          const copyButton = document.createElement('button');
          copyButton.type = 'button';
          copyButton.textContent = section.label === '공통 공개'
            ? '공통 공개 복사'
            : `${section.label.replace(' 공개', '')}용 복사`;
          copyButton.onclick = () => copyText(getSectionCopyText(parsed, section));
          header.appendChild(copyButton);
        }

        block.append(header, pre);
        wrapper.appendChild(block);
      });

      container.appendChild(wrapper);
    }

    function renderLogs(nextLogs) {
      mergeLogs(nextLogs);
      logList.innerHTML = '';

      if (!allLogs.length) {
        latestPublicLogText = '';
        logBox.value = '';
        logCount.textContent = '0 logs';
        logList.textContent = 'No logs yet.';
        return;
      }

      latestPublicLogText = allLogs[0].publicText || allLogs[0].text;
      logBox.value = latestPublicLogText;

      const filteredLogs = getFilteredLogs();
      logCount.textContent = `${filteredLogs.length} / ${allLogs.length} logs`;

      if (!filteredLogs.length) {
        logList.textContent = 'No logs for this filter.';
        return;
      }

      filteredLogs.forEach((log) => {
        const item = document.createElement('div');
        const meta = document.createElement('div');
        const badge = document.createElement('span');
        const title = document.createElement('strong');
        const publicButton = document.createElement('button');
        const publicText = log.publicText || log.text;

        item.className = 'log-item';
        meta.className = 'log-meta';
        badge.className = 'badge';
        badge.textContent = log.type;
        title.textContent = new Date(log.createdAt).toLocaleString();
        publicButton.type = 'button';
        publicButton.textContent = 'Copy public log';
        publicButton.onclick = () => copyText(publicText);

        meta.append(badge, title, publicButton);
        item.appendChild(meta);
        appendLogBody(item, log.text);

        if (publicText !== log.text && parsePvpPublicSections(publicText)) {
          appendLogBody(item, publicText);
        }

        logList.appendChild(item);
      });
    }

    reloadPlayers();
  </script>
</body>
</html>
